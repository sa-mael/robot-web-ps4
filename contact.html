<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARTTOUS | Secure Uplink</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=JetBrains+Mono:wght@400;700&family=Orbitron:wght@500;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-core: #050505;
            --bg-card: #0e0e0e;
            --accent: #7c2ae8;
            --text-main: #e0e0e0;
            --font-tech: 'Orbitron', sans-serif;
            --font-mono: 'JetBrains Mono', monospace;
            --font-body: 'Inter', sans-serif;
            --success: #2ecc71;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--bg-core);
            color: var(--text-main);
            font-family: var(--font-body);
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* HEADER */
        nav { padding: 25px 5%; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #222; }
        .logo { font-family: var(--font-tech); font-size: 1.5rem; font-weight: 900; letter-spacing: 3px; color: #fff; text-decoration: none; }
        .accent { color: var(--accent); }

        /* CONTAINER */
        .contact-container {
            max-width: 1000px;
            margin: 60px auto;
            padding: 0 5%;
            flex: 1;
        }

        .header-block { text-align: center; margin-bottom: 40px; }
        h1 { font-family: var(--font-tech); font-size: 3rem; margin-bottom: 10px; }
        .intro-text { color: #666; font-family: var(--font-mono); font-size: 0.9rem; }

        /* --- FORM SECTION (CENTERED) --- */
        .form-wrapper {
            background: #0a0a0a;
            padding: 40px;
            border: 1px solid #222;
            margin-bottom: 80px; /* Space before info cards */
            box-shadow: 0 0 50px rgba(0,0,0,0.5);
        }

        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
        
        label { font-size: 0.7rem; color: #666; display: block; margin-bottom: 8px; font-family: var(--font-tech); letter-spacing: 1px; }

        .dark-input, select, textarea {
            width: 100%;
            background: #050505;
            border: 1px solid #333;
            padding: 12px 15px;
            color: #fff;
            font-family: var(--font-mono);
            font-size: 0.9rem;
            outline: none;
            transition: 0.3s;
            border-radius: 0;
        }
        .dark-input:focus, select:focus, textarea:focus { border-color: var(--accent); }

        button {
            width: 100%;
            background: var(--accent);
            color: #fff;
            border: none;
            padding: 15px;
            font-family: var(--font-tech);
            font-size: 1rem;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
        }
        button:hover { background: #9d50ff; box-shadow: 0 0 15px rgba(124, 42, 232, 0.3); }

        /* --- INFO GRID (BOTTOM) --- */
        .info-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            border-top: 1px solid #222;
            padding-top: 40px;
        }

        .comm-channel {
            background: rgba(255, 255, 255, 0.02);
            border-top: 2px solid #333; /* Top border style */
            padding: 20px;
            transition: 0.3s;
        }
        .comm-channel:hover {
            background: rgba(124, 42, 232, 0.05);
            border-top-color: var(--accent);
        }

        .channel-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .channel-name { font-family: var(--font-tech); font-size: 0.9rem; color: #fff; }
        
        .status-indicator { font-family: var(--font-mono); font-size: 0.65rem; color: #666; display: flex; align-items: center; gap: 6px; }
        .dot { width: 6px; height: 6px; background: #444; border-radius: 50%; }
        .dot.online { background: var(--success); box-shadow: 0 0 5px var(--success); }
        .dot.busy { background: #e67e22; }

        .channel-desc { font-size: 0.8rem; color: #888; line-height: 1.5; margin-bottom: 15px; min-height: 40px; }
        .channel-link { font-family: var(--font-mono); font-size: 0.7rem; color: var(--accent); text-decoration: none; }
        .channel-link:hover { color: #fff; }

        /* BUG REPORT MODE */
        body.bug-mode { background: #1a0505; }
        body.bug-mode h1 { color: #e74c3c; }
        body.bug-mode .comm-channel { border-top-color: #e74c3c; }
        body.bug-mode button { background: #e74c3c; }
        body.bug-mode .dark-input { border-color: #e74c3c; color: #ffcccc; background: #2b0000; }

        @media (max-width: 900px) {
            .info-grid { grid-template-columns: 1fr; }
            .form-row { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <nav>
        <a href="index.html" class="logo">ART<span class="accent">TOUS</span></a>
        <div style="font-family: 'JetBrains Mono'; font-size: 0.75rem; color: #666;">ENCRYPTED_SSL</div>
    </nav>

    <div class="contact-container">
        
        <div class="header-block">
            <h1 id="pageTitle">ESTABLISH UPLINK</h1>
            <p class="intro-text" id="pageSub">/// TRANSMIT DATA TO CENTRAL COMMAND</p>
        </div>

        <div class="form-wrapper">
            <form id="mainForm">
                <div class="form-row">
                    <div>
                        <label id="lbl-name">OPERATOR ID</label>
                        <input type="text" id="inpName" placeholder="Unknown Operator" class="dark-input">
                    </div>
                    <div>
                        <label id="lbl-email">COMMS LINK (EMAIL)</label>
                        <input type="email" id="inpEmail" placeholder="auth@mesh.net" class="dark-input">
                    </div>
                </div>

                <div style="margin-bottom: 20px;">
                    <label id="lbl-dept">ROUTING PROTOCOL</label>
                    <select class="dark-input">
                        <option>Sales / Enterprise</option>
                        <option>Technical Support</option>
                        <option>Investor Relations</option>
                        <option>Press / Media</option>
                    </select>
                </div>

                <div style="margin-bottom: 20px;">
                    <label id="lbl-msg">PAYLOAD DATA</label>
                    <textarea rows="6" placeholder="Enter transmission..." class="dark-input"></textarea>
                </div>

                <button type="button" id="submitBtn" onclick="sendTransmission()">TRANSMIT DATA</button>
            </form>
        </div>

        <div class="info-grid">
            
            <div class="comm-channel">
                <div class="channel-header">
                    <span class="channel-name">ENTERPRISE</span>
                    <div class="status-indicator"><div class="dot online"></div> ONLINE</div>
                </div>
                <p class="channel-desc">RaaS leasing and fleet integration.</p>
                <a href="mailto:deploy@arttous.com" class="channel-link">DEPLOY@ARTTOUS.COM</a>
            </div>

            <div class="comm-channel">
                <div class="channel-header">
                    <span class="channel-name">ENGINEERING</span>
                    <div class="status-indicator"><div class="dot busy"></div> BUSY</div>
                </div>
                <p class="channel-desc">Support for Firmware v53 & API.</p>
                <a href="mailto:support@arttous.com" class="channel-link">SUPPORT@ARTTOUS.COM</a>
            </div>

            <div class="comm-channel">
                <div class="channel-header">
                    <span class="channel-name">PHYSICAL HQ</span>
                    <div class="status-indicator">SECURE</div>
                </div>
                <p class="channel-desc">123 Innovation Drive, Ontario, CA.<br>(Clearance Lvl 3)</p>
                <div style="width: 10px; height: 10px; cursor: pointer;" onclick="activateBugMode()"></div>
            </div>

        </div>

    </div>

    <script>
        // 1. AUTO-FILL (Memory)
        window.addEventListener('load', () => {
            const savedName = localStorage.getItem('userNick') || localStorage.getItem('userName');
            const savedEmail = localStorage.getItem('userEmail');

            if (savedName) document.getElementById('inpName').value = savedName;
            if (savedEmail) document.getElementById('inpEmail').value = savedEmail;
        });

        // 2. SEND & REDIRECT LOGIC
        function sendTransmission() {
            const btn = document.getElementById('submitBtn');
            const originalText = btn.innerText;
            
            // Step 1: Loading
            btn.innerText = "ENCRYPTING & SENDING...";
            btn.style.opacity = "0.7";
            btn.disabled = true;
            
            setTimeout(() => {
                // Step 2: Success
                btn.innerText = "TRANSMISSION SUCCESSFUL";
                btn.style.background = "#2ecc71"; // Green
                btn.style.color = "#000";
                btn.style.opacity = "1";
                
                // Step 3: DECIDE WHERE TO GO
                setTimeout(() => {
                    const isLoggedIn = localStorage.getItem('userNick'); // Check if we know this user
                    
                    if (isLoggedIn) {
                        btn.innerText = "REDIRECTING TO ACCOUNT...";
                        setTimeout(() => { window.location.href = 'account.html'; }, 1000);
                    } else {
                        btn.innerText = "REDIRECTING TO HQ...";
                        setTimeout(() => { window.location.href = 'index.html'; }, 1000);
                    }
                    
                }, 0.500); // Wait 1.5s showing "Success" before redirecting
            }, 0.500); // Wait 1.5s "Sending"
        }

        // 3. BUG MODE
        function activateBugMode() {
            document.body.classList.toggle('bug-mode');
            const title = document.getElementById('pageTitle');
            const sub = document.getElementById('pageSub');
            const btn = document.getElementById('submitBtn');
            const lblName = document.getElementById('lbl-name');

            if (document.body.classList.contains('bug-mode')) {
                title.innerText = "CRITICAL ERROR";
                sub.innerText = "/// SYSTEM INSTABILITY DETECTED.";
                btn.innerText = "UPLOAD DUMP";
                lblName.innerText = "AFFECTED COMPONENT";
            } else {
                title.innerText = "ESTABLISH UPLINK";
                sub.innerText = "/// TRANSMIT DATA TO CENTRAL COMMAND";
                btn.innerText = "TRANSMIT DATA";
                lblName.innerText = "OPERATOR ID";
            }
        }
    </script>
</body>
</html>
