<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ARTTOUS | SYSTEM RECOVERY v75.4</title>
    <link rel="icon" href="../assets/images/logo-ttr.png" type="image/png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Orbitron:wght@900&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-color: #050505;
            --accent-color: #7c2ae8; 
            --accent-dim: rgba(124, 42, 232, 0.3);
            --text-color: #e0e0e0;
            --error-color: #e74c3c;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg-color);
            background-image: 
                linear-gradient(var(--accent-dim) 1px, transparent 1px),
                linear-gradient(90deg, var(--accent-dim) 1px, transparent 1px);
            background-size: 30px 30px;
            background-position: center;
            color: var(--text-color);
            font-family: 'JetBrains Mono', monospace;
            height: 100vh;
            overflow: hidden; 
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        /* --- CRT SCANLINE & VIGNETTE EFFECT --- */
        body::before {
            content: " "; display: block; position: absolute; top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 50; background-size: 100% 2px, 3px 100%; pointer-events: none;
        }
        body::after {
            content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            box-shadow: inset 0 0 100px rgba(0,0,0,0.9); z-index: 49; pointer-events: none;
        }

        /* --- BOOT SEQUENCE --- */
        .boot-wrapper {
            position: absolute; z-index: 40; text-align: center;
            animation: fadeOutBoot 0.5s 2s forwards;
        }
        .boot-wrapper h2 { font-family: 'Orbitron'; color: var(--accent-color); font-size: 2rem; letter-spacing: 5px; animation: glitch 0.2s infinite;}

        /* --- UI ELEMENTS (Hidden during boot) --- */
        .game-ui {
            opacity: 0; display: flex; flex-direction: column; align-items: center; z-index: 20;
            animation: fadeInUI 1s 2.5s forwards;
        }

        .error-container { text-align: center; margin-bottom: 30px; }

        h1 {
            font-family: 'Orbitron', sans-serif; font-size: 3rem; color: var(--text-color);
            text-transform: uppercase; position: relative; letter-spacing: 2px;
            animation: glitch 3s infinite; text-shadow: 0 0 20px rgba(231, 76, 60, 0.5);
        }
        
        .status-msg {
            color: var(--error-color); font-size: 0.85rem; margin-top: 10px; letter-spacing: 2px;
            background: rgba(231, 76, 60, 0.1); border: 1px solid var(--error-color); padding: 5px 15px;
            animation: pulseWarning 1.5s infinite;
        }

        /* --- GAME CANVAS --- */
        .canvas-wrapper { position: relative; }
        canvas {
            border: 2px solid #333; background: rgba(0,0,0,0.8);
            box-shadow: 0 0 30px rgba(124, 42, 232, 0.15); cursor: crosshair;
            backdrop-filter: blur(5px);
        }

        /* --- INSTRUCTIONS & BUTTONS --- */
        .controls { margin-top: 20px; font-size: 0.8rem; color: #666; text-align: center; line-height: 1.6;}
        .controls span { color: var(--accent-color); font-weight: bold; animation: textGlow 1.5s infinite alternate;}

        #restartBtn {
            display: none; margin-top: 20px; padding: 12px 40px; background: transparent;
            border: 1px solid var(--accent-color); color: var(--accent-color);
            font-family: 'Orbitron'; font-weight: bold; cursor: pointer; transition: 0.3s;
            position: relative; overflow: hidden; letter-spacing: 1px;
        }
        #restartBtn::before {
            content: ''; position: absolute; top: 0; left: -100%; width: 50%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(124,42,232,0.4), transparent); transform: skewX(-20deg); transition: 0.5s;
        }
        #restartBtn:hover { background: var(--accent-color); color: #fff; box-shadow: 0 0 20px var(--accent-color); }
        #restartBtn:hover::before { left: 200%; }

        .digital-sig {
            position: absolute; bottom: 20px; width: 90%; display: flex; justify-content: space-between;
            font-size: 0.7rem; color: #444; z-index: 20;
        }

        /* --- KEYFRAMES --- */
        @keyframes glitch {
            0%, 100% { transform: translate(0) }
            20% { transform: translate(-2px, 1px) }
            40% { transform: translate(-1px, -2px) }
            60% { transform: translate(2px, 1px) }
            80% { transform: translate(1px, -1px) }
        }
        @keyframes fadeOutBoot { to { opacity: 0; visibility: hidden; } }
        @keyframes fadeInUI { to { opacity: 1; } }
        @keyframes pulseWarning { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        @keyframes textGlow { from { text-shadow: 0 0 5px var(--accent-color); } to { text-shadow: 0 0 15px var(--accent-color); } }

        @media (min-width: 768px) { canvas { transform: scale(1.2); margin: 40px 0; } }
    </style>
</head>
<body>

    <div class="boot-wrapper">
        <h2>ERR_KERNEL_PANIC</h2>
        <div style="color: #666; font-size: 0.8rem; margin-top: 10px;">DUMPING MEMORY... FATAL AT 0x00A4</div>
    </div>

    <div class="game-ui">
        <div class="error-container">
            <h1>CORE_DESYNC</h1>
            <div class="status-msg">/// RTOS TASK_CONTROL FAILURE /// MANUAL MEMORY STACKING REQUIRED</div>
        </div>

        <div class="canvas-wrapper">
            <canvas id="gameCanvas" width="300" height="400"></canvas>
        </div>
        
        <div class="controls" id="controlsText">
            ALIGN THE KERNEL BLOCKS.<br>
            <span>TAP SCREEN</span> or PRESS <span>[SPACE]</span> TO LOCK MEMORY.
        </div>

        <button id="restartBtn" onclick="resetGame()">REBOOT KERNEL</button>
    </div>

    <div class="digital-sig">
        <div>SYS_VER: v75.4_RTOS<br>HASH: 0x99a...f42</div>
        <div style="text-align: right;">&copy; 2026 Arttous Robotics<br>RECOVERY TERMINAL</div>
    </div>

    <script>
        // --- ADVANCED GAME ENGINE ---
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const restartBtn = document.getElementById('restartBtn');
        const controlsText = document.getElementById('controlsText');

        // Colors
        const COLOR_BG = 'rgba(0, 0, 0, 0)'; 
        const COLOR_BLOCK = '#7c2ae8'; 
        const COLOR_HIGHLIGHT = '#9d50ff'; 

        // Game State
        let score = 0;
        let gameOver = false;
        let speed = 2.5; 
        let blockHeight = 22;
        let currentLevel = 0;
        let shakeTime = 0; // Screen shake duration

        // Arrays
        let stack = [];
        let debris = []; // Physics objects for cut pieces
        let activeBlock = {};

        // --- PHYSICS & RENDER LOOP ---
        function draw() {
            // Apply Screen Shake
            ctx.save();
            if (shakeTime > 0) {
                const magnitude = (shakeTime / 15) * 5;
                const dx = (Math.random() - 0.5) * magnitude;
                const dy = (Math.random() - 0.5) * magnitude;
                ctx.translate(dx, dy);
                shakeTime--;
            }

            // Clear Screen
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Draw Score Background
            ctx.fillStyle = 'rgba(124, 42, 232, 0.1)';
            ctx.font = '120px Orbitron';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(score, canvas.width/2, canvas.height/2);

            // Draw Static Stack
            stack.forEach((block, index) => {
                // Main Block
                ctx.fillStyle = (index === stack.length - 1 && !gameOver) ? COLOR_HIGHLIGHT : COLOR_BLOCK;
                ctx.fillRect(block.x, block.y, block.w, block.h);
                
                // Tech border detailing
                ctx.strokeStyle = '#000';
                ctx.lineWidth = 2;
                ctx.strokeRect(block.x + 2, block.y + 2, block.w - 4, block.h - 4);
            });

            // Draw Active Block
            if (!gameOver) {
                ctx.fillStyle = '#fff'; 
                ctx.shadowBlur = 15;
                ctx.shadowColor = COLOR_HIGHLIGHT;
                ctx.fillRect(activeBlock.x, activeBlock.y, activeBlock.w, activeBlock.h);
                ctx.shadowBlur = 0; // Reset
            }

            // Draw Debris (Falling pieces)
            ctx.fillStyle = 'rgba(124, 42, 232, 0.5)';
            for (let i = 0; i < debris.length; i++) {
                let d = debris[i];
                ctx.fillRect(d.x, d.y, d.w, d.h);
            }

            ctx.restore(); // Restore shake translation
        }

        function update() {
            if (!gameOver) {
                // Move Active Block
                activeBlock.x += speed * activeBlock.dir;
                if (activeBlock.x + activeBlock.w > canvas.width || activeBlock.x < 0) {
                    activeBlock.dir *= -1; // Bounce
                }
            }

            // Update Debris Physics
            for (let i = debris.length - 1; i >= 0; i--) {
                let d = debris[i];
                d.vy += 0.5; // Gravity
                d.y += d.vy;
                d.x += d.vx;
                if (d.y > canvas.height) {
                    debris.splice(i, 1); // Remove off-screen debris
                }
            }

            draw();
            requestAnimationFrame(update);
        }

        // --- CORE MECHANIC ---
        function placeBlock() {
            if (gameOver) return;

            const prevBlock = stack[stack.length - 1];
            let overlap = activeBlock.w - Math.abs(activeBlock.x - prevBlock.x);

            if (overlap > 0) {
                // Hit
                score++;
                shakeTime = 8; // Screen shake on hit
                if (score % 3 === 0) speed += 0.5; // Speed ramps up

                let newWidth = overlap;
                let newX = activeBlock.x < prevBlock.x ? prevBlock.x : activeBlock.x; 

                // Calculate Debris (Cut portion)
                let cutWidth = activeBlock.w - newWidth;
                if (cutWidth > 0) {
                    debris.push({
                        x: activeBlock.x < prevBlock.x ? activeBlock.x : prevBlock.x + newWidth,
                        y: activeBlock.y,
                        w: cutWidth,
                        h: blockHeight,
                        vx: activeBlock.x < prevBlock.x ? -2 : 2, // Fly left or right
                        vy: -3 // Slight upward bounce
                    });
                }

                // Add to stack
                stack.push({ x: newX, y: activeBlock.y, w: newWidth, h: blockHeight });

                // Move Camera (Fake scroll)
                if (stack.length > 10) {
                    stack.forEach(b => b.y += blockHeight);
                    stack.shift(); 
                } else {
                    activeBlock.y -= blockHeight;
                }

                // Setup next block
                activeBlock.x = 0;
                activeBlock.w = newWidth; 
                activeBlock.dir = speed > 0 ? 1 : -1;

            } else {
                // Complete Miss
                shakeTime = 20; // Big shake
                
                // Turn entire active block into debris
                debris.push({
                    x: activeBlock.x, y: activeBlock.y, w: activeBlock.w, h: activeBlock.h,
                    vx: 0, vy: 2
                });
                
                endGame();
            }
        }

        function endGame() {
            gameOver = true;
            restartBtn.style.display = 'block';
            controlsText.style.display = 'none';
            document.querySelector('.status-msg').innerText = "/// SYNC FAILED /// KERNEL CORRUPTED";
        }

        // --- CONTROLS ---
        window.addEventListener('keydown', (e) => {
            if (e.code === 'Space') { e.preventDefault(); placeBlock(); }
        });
        canvas.addEventListener('mousedown', placeBlock);
        canvas.addEventListener('touchstart', (e) => { e.preventDefault(); placeBlock(); });

        // --- INITIALIZATION ---
        function resetGame() {
            score = 0;
            gameOver = false;
            speed = 3;
            debris = [];
            stack = [{ x: 50, y: 380, w: 200, h: blockHeight }];
            activeBlock = { x: 0, y: 380 - blockHeight, w: 200, h: blockHeight, dir: 1 };
            
            restartBtn.style.display = 'none';
            controlsText.style.display = 'block';
            document.querySelector('.status-msg').innerText = "/// RTOS TASK_CONTROL FAILURE /// MANUAL MEMORY STACKING REQUIRED";
        }

        // Start the engine after CSS boot animation (2.5s)
        setTimeout(() => {
            resetGame();
            update();
        }, 2500);

    </script>
</body>
</html>
