<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Matrix Code Interface</title>
<link rel="icon" href="assets/images/logo-ttr.png" type="image/png">
<style>
    /* Базовые стили страницы */
    body, html {
        margin: 0;
        padding: 0;
        height: 100%;
        background-color: #000;
        color: #fff;
        font-family: 'Courier New', Courier, monospace;
        overflow: hidden;
    }

    /* Главный контейнер (Flexbox для двух колонок) */
    .main-wrapper {
        display: flex;
        width: 100%;
        height: 100vh;
    }

    /* Левый блок для видео */
    .left-video {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        background: linear-gradient(135deg, #0a0a0a 0%, #050505 100%);
        padding: 20px;
        border-right: 2px solid #1a1a1a; /* Граница теперь здесь */
    }

    /* Стили для видео */
    .left-video video {
        width: 100%;
        max-height: 100%;
        border-radius: 8px;
        outline: none;
        box-shadow: 0 0 20px rgba(0, 255, 65, 0.2);
    }

    /* Правый блок с кодом */
    .right-code {
        flex: 1;
        position: relative;
        overflow: hidden;
        background: linear-gradient(90deg, #000 0%, #0a0a0a 100%);
        perspective: 1000px; /* Улучшенный 3D эффект */
    }

    /* Контейнер для каждого из слоев кода */
    .code-layer {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
        will-change: transform; /* Оптимизация производительности */
    }

    /* Анимированная обертка, которая ползет вверх */
    .code-scroll-wrapper {
        display: flex;
        flex-direction: column;
    }

    /* Сам текст кода */
    .code-content {
        padding: 20px 40px;
        white-space: pre-wrap;
        word-wrap: break-word;
        font-size: 14px;
        line-height: 1.6;
        color: #bcbcbc;
        text-shadow: 0 0 5px rgba(0, 255, 65, 0.3);
        letter-spacing: 0.5px;
    }

    /* Улучшенная анимация скролла */
    @keyframes scrollUp {
        0% { 
            transform: translateY(0);
        }
        100% { 
            transform: translateY(-50%);
        }
    }

    /* Дополнительная анимация для эффекта гибернации */
    @keyframes flicker {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.95; }
    }

    /* Для слоев - эффект мигания на фоне */
    .code-layer:nth-child(2) {
        animation: flicker 0.15s infinite;
        animation-delay: 0.05s;
    }

    /* Адаптивный дизайн */
    @media (max-width: 1024px) {
        .main-wrapper {
            flex-direction: column;
        }

        .left-video {
            flex: 1;
            border-right: none;
            border-bottom: 2px solid #1a1a1a;
        }

        .right-code {
            flex: 1;
        }

        .code-content {
            font-size: 12px;
            padding: 15px 20px;
        }
    }

    @media (max-width: 768px) {
        .code-content {
            font-size: 10px;
            padding: 10px 15px;
        }
    }

    /* Плавное появление элементов */
    .code-layer {
        animation-fill-mode: both;
    }
</style>
</head>
<body>

<div class="main-wrapper">
    <div class="left-video">
        <video controls autoplay loop muted>
            <source src="https://youtu.be/gxWSZZUWUTQ?si=LtaWPOsZt640Jcf1" type="video/mp4">
            Ваш браузер не поддерживает видеотег.
        </video>
    </div>

    <div class="right-code" id="code-container"></div>
</div>

<script>
    /**
     * Matrix Code Interface
     * Улучшенная версия с оптимизацией производительности и лучшей структурой
     */

    const myCode = `
// ===== EVENT HANDLER (RTOS MUTEX PROTECTED) =====
void socketEvent(uint8_t num, WStype_t type, uint8_t * payload, size_t length) {
  if(type == WStype_TEXT) {
    JsonDocument doc; 
    DeserializationError error = deserializeJson(doc, payload);
    if(error) return;

    if(doc.containsKey("cmd")) {
      String cmd = doc["cmd"].as<String>();

      if (xSemaphoreTake(stateMutex, pdMS_TO_TICKS(10)) == pdTRUE) {
        
        if(cmd == "mode") { 
          String val = doc["val"].as<String>();
          if(val == "stand") {
            sharedState.mode = 0;
            currentX = 0; 
            currentY = 0; 
            currentTwist = 0;
            currentHeight = DEFAULT_Z;
            for(int i = 0; i < 4; i++) {
              for(int j = 0; j < 4; j++) {
                manualOverride[i][j] = false;
              }
            }
          }
          if(val == "walk") { 
            sharedState.mode = 1; 
            for(int i = 0; i < 4; i++) {
              for(int j = 0; j < 4; j++) {
                manualOverride[i][j] = false;
              }
            }
            if(doc["auto"]) { sharedState.targetX=0; sharedState.targetY=30.0; } 
            else { sharedState.targetX=0; sharedState.targetY=0; } 
          }
        }
        
        if(cmd == "test") { 
          sharedState.mode = 3; 
          sharedState.animationType = doc["val"].as<int>(); 
          isTestMode = true;
        }
        
        if(cmd == "test_stop") {
          sharedState.mode = 0;
          isTestMode = false;
          currentX = 0;
          currentY = 0;
          currentTwist = 0;
          currentHeight = DEFAULT_Z;
        }
        
        if(cmd == "h") sharedState.inputZ = doc["val"].as<float>();
        if(cmd == "active") sharedState.activeLegID = doc["val"].as<int>();
        
        if(cmd == "servo") { 
          sharedState.mode = 2; 
          lastManualInput = millis(); 
          int lIndex = doc["leg"].as<int>();
          if (lIndex >= 0 && lIndex < 4) {
             legs[lIndex].setManual(doc["id"].as<int>(), doc["val"].as<float>());
          }
        }
        
        if(cmd == "calib") sharedState.calibrateIMU = true;
        
        if(cmd == "pad") {
          gamepadActive = true; 
          lastPadPacket = millis(); 
          sharedState.targetX = doc["ly"].as<float>() * -40.0; 
          sharedState.targetY = doc["lx"].as<float>() * 40.0; 
          sharedState.targetTwist = doc["rx"].as<float>() * 20.0;
          float ry = doc["ry"].as<float>(); 
          if(abs(ry) > 0.2) sharedState.inputZ += ry * 2.0; 
          sharedState.inputZ = constrain(sharedState.inputZ, -140.0f, -40.0f);
          JsonArray btn = doc["btn"]; 
          if(!btn.isNull()) { 
            if(btn[0]==1) sharedState.mode = 1; 
            if(btn[1]==1) sharedState.mode = 0; 
          }
        }
        
        xSemaphoreGive(stateMutex);
      }
    }
  }
  else if(type == WStype_CONNECTED) {
    if(num < UINT8_MAX) {
      String msg = "{\\"cfg\\":["; 
      for(int i=0; i<4; i++) { 
        msg += String(CFG[i].mountDeg); 
        if(i<3) msg += ","; 
      } 
      msg += "]}"; 
      webSocket.sendTXT(num, msg);
    }
  }
}
`.repeat(10);

    /**
     * Конфигурация слоев
     */
    const CONFIG = {
        numLayers: 5,
        minSpeed: 550,
        maxSpeed: 900,
        layerOffset: 50,
        opacityStep: 0.6 / 4 // Для 5 слоев: 1.0, 0.8, 0.6, 0.4, 0.2
    };

    /**
     * Инициализация кода в контейнер
     */
    function initializeCodeLayers() {
        const container = document.getElementById('code-container');
        
        // Проверка на наличие контейнера
        if (!container) {
            console.error('Code container not found');
            return;
        }

        // Используем DocumentFragment для лучшей производительности
        const fragment = document.createDocumentFragment();

        for (let i = 0; i < CONFIG.numLayers; i++) {
            const layer = createCodeLayer(i);
            fragment.appendChild(layer);
        }

        container.appendChild(fragment);
    }

    /**
     * Создание одного слоя кода
     * @param {number} index - Индекс слоя
     * @returns {HTMLElement} Элемент слоя
     */
    function createCodeLayer(index) {
        const layer = document.createElement('div');
        layer.className = 'code-layer';
        
        // Вычисляем прозрачность: 1.0, 0.8, 0.6, 0.4, 0.2
        const opacity = 1 - (index * CONFIG.opacityStep);
        layer.style.opacity = opacity;
        
        // Смещение для эффекта 3D-шлейфа
        layer.style.left = `${index * CONFIG.layerOffset}px`;
        
        // Рандомная скорость скролла
        const randomSpeed = Math.random() * (CONFIG.maxSpeed - CONFIG.minSpeed) + CONFIG.minSpeed;
        
        // Собираем HTML с анимацией
        layer.innerHTML = `
            <div class="code-scroll-wrapper" style="animation: scrollUp ${randomSpeed}s linear infinite;">
                <div class="code-content">${escapeHtml(myCode)}</div>
                <div class="code-content">${escapeHtml(myCode)}</div>
            </div>
        `;
        
        // Z-index для правильного наложения слоев (яркий слой сверху)
        layer.style.zIndex = CONFIG.numLayers - index;
        
        return layer;
    }

    /**
     * Экранирование HTML для безопасности
     * @param {string} text - Текст для экранирования
     * @returns {string} Экранированный текст
     */
    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    /**
     * Обработчик события готовности DOM
     */
    document.addEventListener('DOMContentLoaded', function() {
        // Используем requestAnimationFrame для лучшей синхронизации
        requestAnimationFrame(() => {
            initializeCodeLayers();
        });
    });

    /**
     * Обработчик изменения размера окна (для адаптивности)
     */
    window.addEventListener('resize', function() {
        // Здесь можно добавить логику пересчета размеров, если необходимо
    });
</script>
</body>
</html>
