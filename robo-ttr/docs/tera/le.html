<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Model QA | Arttous Platform</title>
    <style>
        body { margin: 0; background: #0b0b0b; overflow: hidden; font-family: monospace; color: #00f3ff; }
        #info {
            position: absolute; top: 10px; left: 10px;
            background: rgba(0,0,0,0.8); padding: 10px;
            border: 1px solid #333; pointer-events: none;
        }
        #loading {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            font-size: 24px; font-weight: bold; letter-spacing: 2px;
        }
        .controls {
            position: absolute; bottom: 10px; left: 10px;
            display: flex; gap: 10px;
        }
        button {
            background: #1a1a1a; color: #00f3ff; border: 1px solid #00f3ff;
            padding: 8px 15px; cursor: pointer; font-family: monospace;
            text-transform: uppercase;
        }
        button:hover { background: #00f3ff; color: #000; }
    </style>
</head>
<body>

    <div id="info">
        <h3>ASSET INSPECTOR</h3>
        <div>File: web-robo-3D.glb</div>
        <div id="poly-count">Polygons: calculating...</div>
        <div id="scale-info">Scale: calculating...</div>
    </div>

    <div id="loading">LOADING ASSET...</div>

    <div class="controls">
        <button onclick="toggleWireframe()">Wireframe</button>
        <button onclick="toggleGrid()">Toggle Grid</button>
        <button onclick="toggleRotation()">Auto-Rotate</button>
    </div>

    <script type="module">
        import * as THREE from 'https://unpkg.com/three@0.160.0/build/three.module.js';
        import { GLTFLoader } from 'https://unpkg.com/three@0.160.0/examples/jsm/loaders/GLTFLoader.js';
        import { OrbitControls } from 'https://unpkg.com/three@0.160.0/examples/jsm/controls/OrbitControls.js';

        // 1. SCENE SETUP
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0b0b0b);
        scene.fog = new THREE.Fog(0x0b0b0b, 10, 50);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(3, 2, 4); // Начальная позиция камеры

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.0;
        document.body.appendChild(renderer.domElement);

        // 2. LIGHTING (Studio Setup)
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
        scene.add(ambientLight);

        const mainLight = new THREE.DirectionalLight(0xffffff, 2);
        mainLight.position.set(5, 10, 7);
        scene.add(mainLight);

        const fillLight = new THREE.DirectionalLight(0x00f3ff, 1); // Cyberpunk fill
        fillLight.position.set(-5, 0, -5);
        scene.add(fillLight);

        // 3. HELPERS
        const gridHelper = new THREE.GridHelper(10, 10, 0x00f3ff, 0x222222);
        scene.add(gridHelper);
        const axesHelper = new THREE.AxesHelper(1); // RGB axes (Red=X, Green=Y, Blue=Z)
        scene.add(axesHelper);

        // 4. CONTROLS
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;

        // 5. LOAD MODEL
        let model = null;
        const loader = new GLTFLoader();
        
        loader.load('./web-robo-3D.glb', function (gltf) {
            model = gltf.scene;
            
            // Центрирование модели
            const box = new THREE.Box3().setFromObject(model);
            const center = box.getCenter(new THREE.Vector3());
            model.position.sub(center); // Сдвигаем в 0,0,0
            model.position.y += (box.max.y - box.min.y) / 2; // Ставим на пол

            scene.add(model);
            
            // Анализ модели
            let triangleCount = 0;
            model.traverse((node) => {
                if (node.isMesh) {
                    triangleCount += node.geometry.index ? node.geometry.index.count / 3 : node.geometry.attributes.position.count / 3;
                    node.castShadow = true;
                    node.receiveShadow = true;
                }
            });
            
            document.getElementById('poly-count').innerText = `Triangles: ${Math.round(triangleCount)}`;
            document.getElementById('scale-info').innerText = `Height: ${(box.max.y - box.min.y).toFixed(2)} units`;
            document.getElementById('loading').style.display = 'none';

        }, undefined, function (error) {
            console.error(error);
            document.getElementById('loading').innerText = 'ERROR LOADING FILE (Check Console)';
            document.getElementById('loading').style.color = 'red';
        });

        // 6. ANIMATION LOOP
        let autoRotate = true;

        window.toggleWireframe = () => {
            if(!model) return;
            model.traverse((child) => {
                if (child.isMesh) {
                    child.material.wireframe = !child.material.wireframe;
                }
            });
        };

        window.toggleGrid = () => {
            gridHelper.visible = !gridHelper.visible;
            axesHelper.visible = !axesHelper.visible;
        };

        window.toggleRotation = () => {
            autoRotate = !autoRotate;
        };

        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            
            if (model && autoRotate) {
                model.rotation.y += 0.005;
            }

            renderer.render(scene, camera);
        }
        animate();

        // Resize handler
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
