<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>3D Робот (Pro Lighting)</title>
    <style>
        body { margin: 0; overflow: hidden; }
    </style>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // 1. СЦЕНА И ТЕМНЫЙ ФОН
        const scene = new THREE.Scene();
        // Темный цвет фона (Hex: #121212 - почти черный графит)
        scene.background = new THREE.Color(0x121212);
        // Можно добавить легкий туман для глубины (опционально)
        scene.fog = new THREE.Fog(0x121212, 2, 10);

        // 2. КАМЕРА (Ваши настройки)
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.01, 100);
        camera.position.z = 0.2; 
        camera.position.y = 0.1;

        // 3. РЕНДЕРЕР (Настройки качества)
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        // Включаем физически корректное освещение
        renderer.useLegacyLights = false; 
        renderer.toneMapping = THREE.ACESFilmicToneMapping; // Киношная цветокоррекция
        renderer.toneMappingExposure = 1.0;
        document.body.appendChild(renderer.domElement);

        // 4. ПРОФЕССИОНАЛЬНЫЙ СВЕТ (Схема из 3 источников)
        
        // A. Ambient Light (Мягкая подсветка теней)
        const ambientLight = new THREE.AmbientLight(0x404040, 1.5); 
        scene.add(ambientLight);

        // B. Key Light (Основной прожектор - теплый белый)
        const keyLight = new THREE.DirectionalLight(0xffffff, 2.5);
        keyLight.position.set(2, 2, 2);
        scene.add(keyLight);

        // C. Rim Light (Контровой свет - холодный голубой для акцента)
        // Светит сзади, чтобы подчеркнуть силуэт робота
        const rimLight = new THREE.SpotLight(0x4a7dff, 5); 
        rimLight.position.set(-1, 2, -2);
        rimLight.lookAt(0, 0, 0);
        scene.add(rimLight);

        // 5. УПРАВЛЕНИЕ
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.target.set(0, 0.05, 0); // Точка вращения чуть выше уровня пола
        controls.update();

        // 6. ЗАГРУЗКА МОДЕЛИ
        const loader = new GLTFLoader();
        loader.load('web-robo-3D.glb', function (gltf) {
            const model = gltf.scene;
            scene.add(model);
            
            // Если модель слишком большая/маленькая, можно раскомментировать и поправить:
            // model.scale.set(1, 1, 1);
            
            console.log("Модель загружена");
        }, undefined, function (error) {
            console.error(error);
        });

        // 7. АНИМАЦИЯ
        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }
        animate();

        // АДАПТАЦИЯ ЭКРАНА
        window.addEventListener('resize', onWindowResize, false);
        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }
    </script>
</body>
</html>
