<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>IK4=24 GOLD | COMMAND</title>
  <style>
    :root { --neon: #00f3ff; --alert: #ff0055; --bg: #050505; --panel: rgba(0, 20, 30, 0.9); }
    body { margin: 0; background: var(--bg); color: var(--neon); font-family: 'Courier New', monospace; overflow: hidden; }
    canvas { position: absolute; top: 0; left: 0; z-index: -1; }
    
    /* UI LAYOUT */
    .ui { position: absolute; width: 100%; height: 100%; pointer-events: none; display: flex; justify-content: space-between; padding: 20px; box-sizing: border-box; }
    .panel { width: 300px; background: var(--panel); border: 1px solid var(--neon); padding: 20px; pointer-events: auto; display: flex; flex-direction: column; gap: 10px; border-radius: 4px; box-shadow: 0 0 20px rgba(0, 243, 255, 0.1); }
    
    /* TYPOGRAPHY */
    h2 { text-align: center; border-bottom: 1px solid var(--neon); margin: 0 0 10px 0; font-size: 16px; letter-spacing: 2px; padding-bottom: 5px; }
    label { font-size: 12px; color: #aaa; display: flex; justify-content: space-between; }
    
    /* CONTROLS */
    button { padding: 15px; background: rgba(0, 243, 255, 0.05); color: var(--neon); border: 1px solid var(--neon); cursor: pointer; font-weight: bold; width: 100%; transition: all 0.2s; text-transform: uppercase; font-size: 12px; }
    button:hover { background: var(--neon); color: #000; box-shadow: 0 0 15px var(--neon); }
    button:active { transform: scale(0.98); }
    button.sel { background: var(--neon); color: #000; box-shadow: 0 0 10px var(--neon); }
    
    input[type=range] { width: 100%; height: 4px; background: #333; outline: none; -webkit-appearance: none; margin: 10px 0; }
    input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 15px; height: 15px; background: var(--neon); cursor: pointer; border-radius: 50%; box-shadow: 0 0 10px var(--neon); }
    
    /* CONNECTION SENSOR */
    .status { text-align:center; font-size:12px; margin-top:auto; padding-top: 10px; border-top: 1px solid #333; color:#666; }
    .conn-led { display: inline-block; width: 10px; height: 10px; border-radius: 50%; background: #333; margin-right: 5px; }
    .connected .conn-led { background: #0f0; box-shadow: 0 0 10px #0f0; animation: pulse 2s infinite; }
    .connected span { color: #fff; text-shadow: 0 0 5px #0f0; }
    @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
  </style>
</head>
<body>

<div class="ui">
  <div class="panel">
    <h2>SYSTEM CONTROL</h2>
    
    <button onclick="send({cmd:'mode', val:'stand'})">INITIALIZE STAND</button>
    
    <button id="btn-walk" onclick="toggleWalk()">ENGAGE WALK CYCLE</button>
    
    <div style="margin-top:10px">
      <label>CHASSIS HEIGHT (Z) <span id="val-z">-100</span></label>
      <input type="range" min="-140" max="-40" value="-100" oninput="send({cmd:'h', val:this.value}); document.getElementById('val-z').innerText=this.value">
    </div>

    <div id="status-box" class="status">
      <div class="conn-led"></div>
      <span id="conn-text">OFFLINE</span>
    </div>
  </div>

  <div class="panel">
    <h2>MANUAL OVERRIDE</h2>
    <div style="display:grid; grid-template-columns:1fr 1fr; gap:5px; margin-bottom:10px;">
      <button id="l0" class="sel" onclick="selLeg(0)">FL (0)</button>
      <button id="l1" onclick="selLeg(1)">FR (1)</button>
      <button id="l2" onclick="selLeg(2)">BL (2)</button>
      <button id="l3" onclick="selLeg(3)">BR (3)</button>
    </div>
    
    <label>COXA (Gamma)</label>
    <input type="range" min="-45" max="45" value="0" oninput="move(0,this.value)">
    
    <label>FEMUR (Alpha)</label>
    <input type="range" min="-90" max="90" value="0" oninput="move(1,this.value)">
    
    <label>TIBIA (Beta)</label>
    <input type="range" min="-90" max="90" value="0" oninput="move(2,this.value)">
    
    <label style="color:#d0f">TWIST (4th Axis)</label>
    <input type="range" min="-45" max="45" value="0" oninput="move(3,this.value)">
  </div>
</div>

<script type="module">
  import * as THREE from 'https://esm.sh/three@0.160.0';
  import { OrbitControls } from 'https://esm.sh/three@0.160.0/examples/jsm/controls/OrbitControls.js';

  // --- WEBSOCKET SETUP ---
  window.ws = new WebSocket(`ws://${location.hostname}:81/`);
  
  // --- 3D SCENE SETUP ---
  const scene = new THREE.Scene(); scene.background = new THREE.Color(0x050505);
  const cam = new THREE.PerspectiveCamera(45, window.innerWidth/innerHeight, 1, 3000); 
  cam.position.set(0, 400, 500); 
  const ren = new THREE.WebGLRenderer({antialias:true}); 
  ren.setSize(window.innerWidth, window.innerHeight); 
  document.body.appendChild(ren.domElement);
  new OrbitControls(cam, ren.domElement);
  
  scene.add(new THREE.GridHelper(2000, 100, 0x00f3ff, 0x111111)); 
  scene.add(new THREE.AmbientLight(0xffffff, 0.6));
  const spot = new THREE.PointLight(0x00f3ff, 1.0, 1000); spot.position.set(0, 500, 0); scene.add(spot);

  // --- ROBOT MESHES ---
  const matWire = new THREE.MeshBasicMaterial({color:0x00f3ff, wireframe:true, transparent:true, opacity:0.3});
  const matBody = new THREE.MeshStandardMaterial({color:0x111111, roughness:0.2, metalness:0.8}); 
  const matPurple = new THREE.MeshBasicMaterial({color:0xaa00ff, wireframe:true}); 

  const body = new THREE.Group();
  body.add(new THREE.Mesh(new THREE.BoxGeometry(77, 46, 134), matBody));
  body.add(new THREE.Mesh(new THREE.BoxGeometry(80, 50, 137), matWire));
  body.position.y = 23; scene.add(body);

  const legsVis = [];
  function createLeg(x, z, mountDeg) {
    const root = new THREE.Group(); root.position.set(x, 23, z); 
    
    // Mount (Handles Gamma + Twist)
    const mount = new THREE.Group(); 
    // We start with the physical mounting angle
    mount.rotation.y = mountDeg * (Math.PI/180); 
    root.add(mount);
    
    const f = new THREE.Group(); f.position.x = 66; mount.add(f);
    const t = new THREE.Group(); t.position.x = 69; f.add(t);
    
    mount.add(new THREE.Mesh(new THREE.BoxGeometry(66,10,10).translate(33,0,0), matWire)); // Coxa
    mount.add(new THREE.Mesh(new THREE.BoxGeometry(20,15,15).translate(10,0,0), matPurple)); // Servo Block
    f.add(new THREE.Mesh(new THREE.BoxGeometry(69,8,8).translate(34.5,0,0), matWire)); // Femur
    t.add(new THREE.Mesh(new THREE.BoxGeometry(123,5,5).translate(61.5,0,0), matWire)); // Tibia
    
    root.userData = { m: mount, f:f, t:t, baseRot: mountDeg };
    scene.add(root); legsVis.push(root);
  }
  
  createLeg(-38.8, -67.4, 45);   // FL
  createLeg(38.8, -67.4, -45);   // FR
  createLeg(-38.8, 67.4, 135);   // BL
  createLeg(38.8, 67.4, -135);   // BR

  // --- RENDER LOOP ---
  function loop() { requestAnimationFrame(loop); ren.render(scene, cam); } loop();

  // --- EVENTS ---
  ws.onopen = () => { 
    document.getElementById('status-box').classList.add('connected');
    document.getElementById('conn-text').innerText = "SYSTEM ONLINE"; 
  };
  ws.onclose = () => { 
    document.getElementById('status-box').classList.remove('connected');
    document.getElementById('conn-text').innerText = "CONNECTION LOST"; 
  };

  ws.onmessage = (e) => {
    try {
      const d = JSON.parse(e.data);
      if(d.l) {
         d.l.forEach((ang, i) => {
           // VISUAL SYNC:
           // ang[0] = Gamma Servo (includes Mount Offset + 90)
           // ang[1] = Alpha Servo (includes 90)
           // ang[2] = Beta Servo (includes 90)
           // ang[3] = Twist Servo (includes 90)
           
           // Apply Gamma: Remove 90 offset. The Mount Y rotation is Absolute.
           // However, we must account for the initial mountDeg (ang[0] includes it).
           // So if we set Y directly to (ang[0]-90), it should match physics.
           legsVis[i].userData.m.rotation.y = (ang[0] - 90) * 0.0174533;
           
           // Apply Twist: Rotate mount on X axis
           legsVis[i].userData.m.rotation.x = (ang[3] - 90) * 0.0174533;

           // Apply Femur
           legsVis[i].userData.f.rotation.z = (90 - ang[1]) * 0.0174533;

           // Apply Tibia
           legsVis[i].userData.t.rotation.z = (90 - ang[2]) * 0.0174533;
         });
      }
    } catch(err) {}
  };
</script>
<script>
  let activeLeg = 0; let walking = false;
  
  window.toggleWalk = function() {
    walking = !walking;
    const btn = document.getElementById('btn-walk');
    btn.innerText = walking ? "DISENGAGE WALK" : "ENGAGE WALK CYCLE";
    btn.style.background = walking ? "#00f3ff" : "rgba(0, 243, 255, 0.05)";
    btn.style.color = walking ? "#000" : "#00f3ff";
    send({cmd:'mode', val: walking ? 'walk' : 'stand'});
  }
  
  window.selLeg = function(id) {
    activeLeg = id;
    document.querySelectorAll('#l0, #l1, #l2, #l3').forEach(b => b.classList.remove('sel'));
    document.getElementById('l'+id).classList.add('sel');
    send({cmd:'active', val: id});
  }
  
  window.send = function(data) { if(ws.readyState===1) ws.send(JSON.stringify(data)); }
  
  window.move = function(id, val) { 
    send({cmd:'servo', leg: activeLeg, id:id, val:parseInt(val)}); 
  }
</script>
</body>
</html>
