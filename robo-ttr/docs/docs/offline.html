<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SYSTEM FAILURE | RECOVERY MODE</title>
    <link rel="icon" href="../assets/images/logo-ttr.png" type="image/png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Orbitron:wght@900&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-color: #050505;
            --accent-color: #7c2ae8; /* Твой фирменный фиолетовый */
            --text-color: #e0e0e0;
            --scanline: rgba(124, 42, 232, 0.03);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'JetBrains Mono', monospace;
            height: 100vh;
            overflow: hidden; /* Запрещаем скролл, это терминал */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        /* --- CRT SCANLINE EFFECT (Эффект старого монитора) --- */
        body::before {
            content: " ";
            display: block;
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 10;
            background-size: 100% 2px, 3px 100%;
            pointer-events: none;
        }

        /* --- GLITCH TEXT --- */
        .error-container {
            text-align: center;
            margin-bottom: 20px;
            z-index: 20;
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 4rem;
            color: var(--text-color);
            text-transform: uppercase;
            position: relative;
            animation: glitch 1s infinite;
        }
        
        .status-msg {
            color: var(--accent-color);
            font-size: 0.9rem;
            margin-top: 10px;
            letter-spacing: 2px;
        }

        @keyframes glitch {
            0% { transform: translate(0) }
            20% { transform: translate(-2px, 2px) }
            40% { transform: translate(-2px, -2px) }
            60% { transform: translate(2px, 2px) }
            80% { transform: translate(2px, -2px) }
            100% { transform: translate(0) }
        }

        /* --- GAME CANVAS --- */
        canvas {
            border: 2px solid #222;
            background: #000;
            box-shadow: 0 0 20px rgba(124, 42, 232, 0.2);
            z-index: 20;
            cursor: pointer;
        }

        /* --- INSTRUCTIONS --- */
        .controls {
            margin-top: 20px;
            font-size: 0.75rem;
            color: #555;
            z-index: 20;
        }
        .controls span { color: var(--accent-color); font-weight: bold; }

        /* --- RESTART BUTTON (Hidden by default) --- */
        #restartBtn {
            display: none;
            margin-top: 20px;
            padding: 10px 30px;
            background: transparent;
            border: 1px solid var(--accent-color);
            color: var(--accent-color);
            font-family: 'Orbitron';
            cursor: pointer;
            z-index: 30;
            transition: 0.3s;
        }
        #restartBtn:hover {
            background: var(--accent-color);
            color: #fff;
            box-shadow: 0 0 15px var(--accent-color);
        }
         /* FOOTER SIGNATURE */
        .digital-sig {
            margin-top: 80px;
            padding-top: 20px;
            border-top: 1px solid #333;
            display: flex;
            justify-content: space-between;
            font-family: var(--font-mono);
            font-size: 0.75rem;
            color: #555;
        } 

    </style>
</head>
<body>

    <div class="error-container">
        <h1 data-text="SYSTEM_OFFLINE">ERROR_404</h1>
        <div class="status-msg">/// CONNECTION LOST /// MANUAL SYNC REQUIRED</div>
    </div>

    <canvas id="gameCanvas" width="300" height="400"></canvas>
    
    <div class="controls" id="controlsText">
        TAP SCREEN or PRESS [SPACE] TO LOCK BLOCK
    </div>

    <button id="restartBtn" onclick="resetGame()">REBOOT SYSTEM</button>
     <div class="digital-sig">
            <div>
                SIGNED: <span style="color: var(--accent);">SYSTEM_ADMIN</span><br>
                HASH: 0x99a...f42
            </div>
            <div style="text-align: right;">
                &copy; 2026 Arttous Robotics Inc.<br>
                ALL RIGHTS RESERVED.
            </div>
        </div>

    <script>
        // --- GAME CONFIG ---
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const restartBtn = document.getElementById('restartBtn');
        const controlsText = document.getElementById('controlsText');

        // Colors
        const COLOR_BG = '#000000';
        const COLOR_BLOCK = '#7c2ae8'; // TTR Purple
        const COLOR_GHOST = '#2a0e4f'; // Darker purple for debris

        // Logic Variables
        let score = 0;
        let gameOver = false;
        let speed = 2; // Starting speed
        let blockHeight = 20;
        let currentLevel = 10; // Start from bottom
        
        // The "Stack"
        // Base block (The floor)
        let stack = [{
            x: 50,
            y: 380, // Bottom of canvas
            w: 200,
            h: blockHeight
        }];

        // The Moving Block
        let activeBlock = {
            x: 0,
            y: 360, // One step up
            w: 200,
            h: blockHeight,
            dir: 1 // 1 = right, -1 = left
        };

        // --- GAME LOOP ---
        function draw() {
            // Clear Screen
            ctx.fillStyle = COLOR_BG;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Draw Score (Background number)
            ctx.fillStyle = '#111';
            ctx.font = '100px Orbitron';
            ctx.textAlign = 'center';
            ctx.fillText(score, canvas.width/2, 150);

            // Draw Static Stack
            ctx.fillStyle = COLOR_BLOCK;
            stack.forEach(block => {
                ctx.fillRect(block.x, block.y, block.w, block.h);
                // Simple glow effect
                ctx.shadowBlur = 10;
                ctx.shadowColor = COLOR_BLOCK;
            });
            ctx.shadowBlur = 0; // Reset glow for performance

            // Draw Active Block
            if (!gameOver) {
                ctx.fillStyle = '#fff'; // Active block is white until placed
                ctx.fillRect(activeBlock.x, activeBlock.y, activeBlock.w, activeBlock.h);
            }
        }

        function update() {
            if (gameOver) return;

            // Move Block
            activeBlock.x += speed * activeBlock.dir;

            // Bounce off walls
            if (activeBlock.x + activeBlock.w > canvas.width || activeBlock.x < 0) {
                activeBlock.dir *= -1;
            }

            draw();
            requestAnimationFrame(update);
        }

        // --- CORE MECHANIC: PLACE BLOCK ---
        function placeBlock() {
            if (gameOver) return;

            // Get the block below the current one
            const prevBlock = stack[stack.length - 1];

            // Calculate overlap
            let overlap = activeBlock.w - Math.abs(activeBlock.x - prevBlock.x);

            if (overlap > 0) {
                // SUCCESS: Block landed
                score++;
                
                // Speed up slightly every 2 blocks
                if (score % 2 === 0) speed += 0.5;

                // Crop the block size
                let newWidth = overlap;
                let newX = prevBlock.x; 
                
                // Determine if we cut from left or right
                if (activeBlock.x < prevBlock.x) {
                    newX = prevBlock.x; // Block was to the left
                } else {
                    newX = activeBlock.x; // Block was to the right
                }

                // Add to stack
                stack.push({
                    x: newX,
                    y: activeBlock.y,
                    w: newWidth,
                    h: blockHeight
                });

                // Move Camera Down (fake scroll) if stack gets too high
                if (stack.length > 10) {
                    stack.forEach(b => b.y += blockHeight);
                    stack.shift(); // Remove bottom block to save memory
                } else {
                    // Move active block up
                    activeBlock.y -= blockHeight;
                }

                // Setup next block
                activeBlock.x = 0;
                activeBlock.w = newWidth; // New block inherits the smaller width!
                activeBlock.dir = 1;

            } else {
                // FAIL: Missed completely
                endGame();
            }
        }

        function endGame() {
            gameOver = true;
            draw(); // Draw final state
            
            // "System Failure" Text
            ctx.fillStyle = '#fff';
            ctx.font = '20px JetBrains Mono';
            ctx.fillText("SYNC FAILED", canvas.width/2, canvas.height/2);
            
            restartBtn.style.display = 'block';
            controlsText.style.display = 'none';
        }

        // --- CONTROLS ---
        window.addEventListener('keydown', (e) => {
            if (e.code === 'Space') placeBlock();
        });
        
        canvas.addEventListener('mousedown', placeBlock);
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault(); // Stop scrolling
            placeBlock();
        });

        // --- INIT ---
        function resetGame() {
            score = 0;
            gameOver = false;
            speed = 2;
            stack = [{ x: 50, y: 380, w: 200, h: blockHeight }];
            activeBlock = { x: 0, y: 360, w: 200, h: blockHeight, dir: 1 };
            restartBtn.style.display = 'none';
            controlsText.style.display = 'block';
            update();
        }

        // Start
        resetGame();

    </script>
</body>
</html>
